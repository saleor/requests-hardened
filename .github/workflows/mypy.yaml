name: Typechecker
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
env:
  # Disable creating virtual envs instead CI/CD due to being unnecessary.
  POETRY_VIRTUALENVS_CREATE: "false"

jobs:
  test:
    permissions:
      contents: read

    runs-on: ubuntu-24.04
    name: Lint

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Setup Python
        uses: actions/setup-python@61a6322f88396a6271a6ee3565807d608ecaddd1 # v4.7.0
        with:
          # Note: must be the lowest supported version (to ensure compatibility)
          python-version-file: ".github/requirements/.python_version"

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          # WARNING: remember to bump 'build-system' in ./pyproject.toml when changing
          #          the uv version
          version: "0.11.19"
          # hash for 'uv-x86_64-unknown-linux-gnu.tar.gz'
          # (from https://github.com/astral-sh/uv/releases)
          checksum: "7035608168e106375b36d0c818d537a889c51a8625fe7f8f7cad5e62b947c368"

      - name: Install Dependencies
        run: |
          uv sync --locked --no-editable --link-mode=copy

      - name: Run Mypy
        run: uv run mypy .
