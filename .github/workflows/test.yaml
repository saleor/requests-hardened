name: Tests
on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  test:
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "pypy3.11"
        os:
          - macos-latest
          - windows-latest
          - ubuntu-24.04

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} @ ${{ matrix.python-version }}
    # A lot wiggle room is needed due to:
    # - PyPI can occasionally slow down.
    # - MacOS and Windows machines can sometimes be slower than the Linux ones.
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - if: ${{ matrix.os != 'macos-latest' && matrix.os != 'windows-latest' }}
        name: Install uv (Ubuntu)
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          # WARNING: remember to bump 'build-system' in ./pyproject.toml when changing
          #          the uv version
          version: "0.11.19"
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          # hash for 'uv-x86_64-unknown-linux-gnu.tar.gz'
          # (from https://github.com/astral-sh/uv/releases)
          checksum: "7035608168e106375b36d0c818d537a889c51a8625fe7f8f7cad5e62b947c368"

      - if: ${{ matrix.os == 'macos-latest' }}
        name: Install uv (MacOS)
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.19"
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          # hash for 'uv-aarch64-apple-darwin.tar.gz'
          # (from https://github.com/astral-sh/uv/releases)
          checksum: "d8f59c38e8c4168ee468d423cd63184be12fa6995a4283d41ee1a14d003c9453"

      - if: ${{ matrix.os == 'windows-latest' }}
        name: Install uv (Windows)
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.19"
          python-version: ${{ matrix.python-version }}
          activate-environment: true
          # hash for 'uv-x86_64-pc-windows-msvc.zip'
          # (from https://github.com/astral-sh/uv/releases)
          checksum: "1665fc8e37b5d70a134820d6d7891747471a2ac8bc940ee7af0b69fd03b28d61"

      - name: Install Dependencies
        # We cannot use --require-hashes here as we are using different Python versions.
        run: |
          uv sync --locked --no-editable --link-mode=copy

      - name: Run Tests
        # Tests should takes only a few seconds to run.
        # If it takes several minutes, then something is stuck.
        timeout-minutes: 5
        run: uv run pytest tests/
